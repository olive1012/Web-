<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ようこそ - Web Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gradient 15s ease infinite;
        }
        
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideIn 0.8s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            animation: fadeInScale 1s ease-out 0.2s both;
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .emoji {
            display: inline-block;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
            animation: fadeIn 1s ease-out 0.4s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .info-text {
            color: #999;
            font-size: 0.95em;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out 0.6s both;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.8s both;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }
        
        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .button:hover::before {
            left: 100%;
        }
        
        .button.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .button.secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
        }
        
        .circle {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            animation: float 20s infinite;
        }
        
        .circle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-duration: 25s;
        }
        
        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation-duration: 30s;
            animation-direction: reverse;
        }
        
        .circle:nth-child(3) {
            width: 120px;
            height: 120px;
            bottom: 20%;
            left: 15%;
            animation-duration: 35s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 40px;
            animation: fadeIn 1s ease-out 1s both;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: countUp 2s ease-out 1.2s both;
        }
        
        @keyframes countUp {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape circle"></div>
        <div class="shape circle"></div>
        <div class="shape circle"></div>
    </div>
    
    <div class="container">
        <h1><span class="emoji">🎉</span> GitHub Pagesへようこそ</h1>
        <p>このサイトはGitHub Pagesでホストされています</p>
        <p class="info-text">リポジトリ: olive1012/Web-</p>
        
        <div class="button-group">
            <a href="#" class="button">🚀 Get Started</a>
            <a href="#" class="button secondary">📚 ドキュメント</a>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number">100%</div>
                <div class="stat-label">Responsive</div>
            </div>
            <div class="stat">
                <div class="stat-number">✨</div>
                <div class="stat-label">Animated</div>
            </div>
            <div class="stat">
                <div class="stat-number">⚡</div>
                <div class="stat-label">Fast</div>
            </div>
        </div>
    </div>
</body>
</html>
